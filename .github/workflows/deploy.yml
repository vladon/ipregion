name: Deploy static site

on:
  push:
    branches:
      - master
    paths:
      - ipregion.sh
      - index.php
      - .github/workflows/deploy.yml
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-ipregion-vladon-sh
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq rsync

      - name: Extract version metadata
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION_TYPE="tag"
            VERSION_VALUE="${{ github.event.release.tag_name }}"
            COMMIT_HASH="${GITHUB_SHA:0:8}"
          else
            VERSION_TYPE="commit"
            VERSION_VALUE="${GITHUB_SHA:0:8}"
            COMMIT_HASH=""
          fi

          BUILD_DATE=$(git log -1 --format=%cI HEAD)
          VERSION_METADATA="${VERSION_TYPE}|${VERSION_VALUE}|${BUILD_DATE}|${COMMIT_HASH}"

          echo "version_type=${VERSION_TYPE}" >> "$GITHUB_OUTPUT"
          echo "version_value=${VERSION_VALUE}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "commit_hash=${COMMIT_HASH}" >> "$GITHUB_OUTPUT"
          echo "version_metadata=${VERSION_METADATA}" >> "$GITHUB_OUTPUT"
          echo "Version metadata: ${VERSION_METADATA}"

      - name: Inject version into script
        run: |
          sed -i "s#^SCRIPT_VERSION_METADATA=.*#SCRIPT_VERSION_METADATA=\"${{ steps.version.outputs.version_metadata }}\"#" ipregion.sh
          grep "^SCRIPT_VERSION_METADATA=" ipregion.sh

      - name: Run tests
        run: bash tests/run.sh

      - name: Configure SSH
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.HH01_DEPLOY_KEY }}" > ~/.ssh/hh01_deploy_key
          chmod 600 ~/.ssh/hh01_deploy_key
          cat > ~/.ssh/config <<'EOF'
          Host ru00-jump
            HostName ru00.vladon.ooo
            User deploy
            IdentityFile ~/.ssh/hh01_deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new

          Host hh01-ipregion
            HostName 2a10:ccc1:1333:18::a
            User deploy
            IdentityFile ~/.ssh/hh01_deploy_key
            IdentitiesOnly yes
            ProxyJump ru00-jump
            StrictHostKeyChecking accept-new
          EOF

      - name: Deploy files
        run: |
          rsync -az --delete \
            ipregion.sh index.php README.md LICENSE \
            hh01-ipregion:/srv/www/ipregion.vladon.sh/
